name: Atualizar Dados Aquiraz

on:
  schedule:
    - cron: '0 0 * * *' # Roda todo dia à meia-noite
  workflow_dispatch: # Permite rodar manualmente clicando em um botão

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Bibliotecas
        run: pip install requests pandas

      - name: Rodar Script
        run: python main.py

      - name: Salvar arquivos atualizados
        run: |
          git config --global user.name 'Robo-Aquiraz'
          git config --global user.email 'bot@github.com'
          git add .
          git commit -m "Atualização automática de dados" || echo "Sem mudanças"
          git push
